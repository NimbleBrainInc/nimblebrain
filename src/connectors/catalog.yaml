# Default static registry of remote MCP connectors NimbleBrain knows
# about. Wire shape is the upstream MCP registry's `ServerDetail` —
# every entry is ajv-validated against `schemas/server.schema.json`
# before it leaves the registry.
#
# `_meta["ai.nimblebrain/connector"]` carries platform-specific fields
# that don't fit upstream-defined slots (defaultScope, OAuth flow type,
# operator-setup pointer, recommended scopes, search tags, UI hints).
#
# Operators with custom curation needs override this list at runtime by
# pointing `NB_REGISTRIES` at a JSON config that adds their own
# `StaticRegistry` instance, or by setting the deprecated
# `NB_CATALOG_PATH` env to a YAML/JSON file in the same shape (see
# `static-registry.ts` for resolution rules).
#
# Convention: keep ordering alphabetical by name within scope groupings
# (workspace-shared first, user-scoped second) so diffs read clean.
# Secrets stay OUT of this file. `auth: static` entries reference the
# credential store via `operatorSetup.clientSecretKey` — the value is
# set by the workspace admin via the Set up modal.

servers:
  # ── Workspace-scoped (shared organizational identity) ──────────
  - name: io.asana/mcp
    title: Asana
    description: Tasks, projects, and team workflows
    version: "1.0.0"
    icons:
      - src: https://static.nimblebrain.ai/icons/asana.svg
        sizes: ["any"]
    remotes:
      - type: streamable-http
        url: https://mcp.asana.com/v2/mcp
    _meta:
      ai.nimblebrain/connector:
        defaultScope: workspace
        auth: static
        operatorSetup:
          portalUrl: https://app.asana.com/0/my-apps
          hint: Create an OAuth app in Asana developer portal, copy client_id + client_secret
          clientSecretKey: asana.client_secret
        tags: [tasks, projects]

  - name: com.notion/mcp
    title: Notion (org)
    description: Read & write workspace pages — shared workspace identity
    version: "1.0.0"
    icons:
      - src: https://static.nimblebrain.ai/icons/notion.svg
        sizes: ["any"]
    remotes:
      - type: streamable-http
        url: https://mcp.notion.com/mcp
    _meta:
      ai.nimblebrain/connector:
        defaultScope: workspace
        auth: dcr
        tags: [docs, knowledge]

  # ── Member-scoped (personal account per user) ─────────────────
  - name: com.google.gmail/mcp
    title: Gmail
    description: Read, send, label your email
    version: "1.0.0"
    icons:
      - src: https://static.nimblebrain.ai/icons/gmail.svg
        sizes: ["any"]
    remotes:
      - type: streamable-http
        url: https://gmailmcp.googleapis.com/mcp/v1
    _meta:
      ai.nimblebrain/connector:
        defaultScope: user
        auth: static
        requiredScopes:
          - https://www.googleapis.com/auth/gmail.readonly
          - https://www.googleapis.com/auth/gmail.send
        additionalAuthorizationParams:
          access_type: offline
          prompt: consent
        operatorSetup:
          portalUrl: https://console.cloud.google.com/apis/credentials
          hint: Create an OAuth 2.0 Client ID (web application) in Google Cloud Console; add the NimbleBrain callback URL as an authorized redirect URI
          clientSecretKey: google.client_secret
        tags: [email, google]

  - name: ai.granola/mcp
    title: Granola
    description: Personal meeting notes and transcripts
    version: "1.0.0"
    icons:
      - src: https://static.nimblebrain.ai/icons/granola.svg
        sizes: ["any"]
    remotes:
      - type: streamable-http
        url: https://mcp.granola.ai/mcp
    _meta:
      ai.nimblebrain/connector:
        defaultScope: user
        auth: dcr
        tags: [meetings, notes]

  - name: com.hubspot/mcp
    title: HubSpot
    description: CRM contacts, deals, and pipeline
    version: "1.0.0"
    icons:
      - src: https://static.nimblebrain.ai/icons/hubspot.svg
        sizes: ["any"]
    remotes:
      - type: streamable-http
        url: https://mcp.hubspot.com
    _meta:
      ai.nimblebrain/connector:
        defaultScope: user
        auth: static
        operatorSetup:
          portalUrl: https://developers.hubspot.com/docs/apps/developer-platform/build-apps/integrate-with-the-remote-hubspot-mcp-server
          hint: Create an MCP Auth App in HubSpot Developer Portal; copy client_id + client_secret
          clientSecretKey: hubspot.client_secret
        tags: [crm, sales]

  - name: com.microsoft.outlook/mcp
    title: Outlook
    description: Microsoft 365 mail
    version: "1.0.0"
    icons:
      - src: https://static.nimblebrain.ai/icons/outlook.svg
        sizes: ["any"]
    remotes:
      - type: streamable-http
        url: https://mcp.microsoft.com/mail
    _meta:
      ai.nimblebrain/connector:
        defaultScope: user
        auth: static
        requiredScopes:
          - https://graph.microsoft.com/Mail.ReadWrite
          - https://graph.microsoft.com/Mail.Send
          - offline_access
        operatorSetup:
          portalUrl: https://entra.microsoft.com/#view/Microsoft_AAD_RegisteredApps/ApplicationsListBlade
          hint: Register a multi-tenant app in Entra ID; add Microsoft Graph delegated permissions; copy client_id + client_secret
          clientSecretKey: entra.client_secret
        tags: [email, microsoft]

  - name: us.zoom/mcp
    title: Zoom
    description: Meetings, recordings, contacts
    version: "1.0.0"
    icons:
      - src: https://static.nimblebrain.ai/icons/zoom.svg
        sizes: ["any"]
    remotes:
      - type: streamable-http
        url: https://mcp.zoom.us/mcp
    _meta:
      ai.nimblebrain/connector:
        defaultScope: user
        auth: static
        requiredScopes: [meeting:read, recording:read]
        operatorSetup:
          portalUrl: https://marketplace.zoom.us/develop/create
          hint: Create an OAuth User-Managed app in Zoom Marketplace; add scopes; copy client_id + client_secret
          clientSecretKey: zoom.client_secret
        tags: [meetings, video]
