services:
  platform:
    image: ghcr.io/nimblebraininc/nimblebrain:latest
    build: .
    restart: unless-stopped
    volumes:
      - workspace:/data
      - ./skills:/app/skills:ro
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_GENERATIVE_AI_API_KEY=${GOOGLE_GENERATIVE_AI_API_KEY:-}
    networks:
      - internal

  web:
    image: ghcr.io/nimblebraininc/nimblebrain-web:latest
    # Build context is the repo root, not web/ — the web tsconfig path
    # alias `@platform/schemas/*` resolves to a sibling tree
    # (`../src/tools/platform/schemas/*`), so the build needs both.
    build:
      context: .
      dockerfile: web/Dockerfile
    restart: unless-stopped
    ports:
      - "27246:8080"
    environment:
      - PLATFORM_URL=http://platform:27247
    depends_on:
      platform:
        condition: service_healthy
    networks:
      - internal

volumes:
  workspace:

networks:
  internal:
