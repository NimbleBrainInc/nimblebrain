name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on a PR branch (new push kills the old run), but never
# cancel a push to main: each main commit must complete so its SHA-tagged image
# lands in ECR (see build-and-push). On push events head_ref is empty, so the
# group falls back to the unique run_id — making every main run its own group.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

# Single source of truth for the bun toolchain version across every job.
# Pinned (not `latest`) for deterministic CI; bump here to upgrade.
env:
  BUN_VERSION: "1.3.14"

# Each job runs a single `bun run verify:*` (or underlying) script. Do not
# inline individual check steps here — package.json is the source of truth
# for what "verify" means. If a job needs a new check, add it to the matching
# verify subscript in package.json so local `bun run verify` stays in parity.
jobs:
  lint-and-check:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Install dependencies
        run: bun install
      - name: Install web dependencies
        run: cd web && bun install
      - name: Verify (static)
        run: bun run verify:static

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Install dependencies
        run: bun install
      - name: Install web dependencies
        run: cd web && bun install
      # Bundle UI deps must be installed so each bundle's co-located tests
      # (e.g. the automations markdown sanitizer contract) can resolve their
      # own npm dependencies (marked, dompurify, happy-dom). `test:bundles`
      # runs `bun test` inside each src/bundles/*/ui package. Mirrors the
      # install loop inside build:bundles; CI doesn't build bundles for the
      # unit job, so the install must be explicit.
      - name: Install bundle UI dependencies
        run: bun run install:bundles
      - name: Verify (unit + web tests)
        run: bun run verify:test-unit

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Install dependencies
        run: bun install
      - name: Integration tests
        run: bun run test:integration

  # Does this push change anything that ships in an image? Gates only the edge
  # bump (roll-staging-edge) — NOT build-and-push, which still publishes a
  # SHA-tagged image for every main commit. A merge touching only paths that
  # .dockerignore already drops from both images (docs/, test/, .github/,
  # root-level *.md) produces a byte-identical runtime, so rolling the staging
  # edge channel onto it is pure churn. Note the ignore set is NOT `**/*.md`:
  # some markdown under src/ (e.g. src/skills/core/soul.md) is shipped prompt
  # content and must still trigger a bump.
  #
  # Fails safe: a first push / force-reset (no prior SHA) or a compare-API error
  # counts as image-relevant, so the only failure mode is an unnecessary bump,
  # never a skipped one.
  changes:
    name: Detect image-affecting changes
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    outputs:
      image_relevant: ${{ steps.detect.outputs.image_relevant }}
    steps:
      - name: Compare changed paths
        id: detect
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.sha }}
        run: |
          set -euo pipefail
          zero="0000000000000000000000000000000000000000"
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "$zero" ]; then
            echo "no prior SHA (new branch / force-reset) — treating as image-relevant"
            echo "image_relevant=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if ! files="$(gh api "repos/$REPO/compare/$BEFORE...$AFTER" --jq '.files[].filename' 2>/dev/null)"; then
            echo "compare API failed — treating as image-relevant"
            echo "image_relevant=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Keep only files OUTSIDE the .dockerignore-excluded set. `[^/]+\.md$`
          # is root-level *.md only, so nested shipped markdown (src/skills/**)
          # is retained and still counts as image-relevant.
          shipping="$(printf '%s\n' "$files" | grep -Ev '^(docs/|test/|\.github/|[^/]+\.md$)' || true)"
          if [ -n "$shipping" ]; then
            echo "image-affecting paths changed:"
            printf '%s\n' "$shipping"
            echo "image_relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "only non-shipping paths changed — skipping edge bump"
            echo "image_relevant=false" >> "$GITHUB_OUTPUT"
          fi

  # Build + push a SHA-tagged image for every commit that lands on main, so
  # `make deploy` can roll out any main commit without a manual local push.
  # This is the everyday counterpart to release.yml (which builds on `v*`
  # tags): same ECR repos, same `:<short-sha>` tag — a `v*` release just adds
  # the version tag and GHCR/`:latest` on top. Gating on every check above
  # means an image only exists in ECR if it built green, which closes the
  # "deployed a tag that was never pushed" hole.
  #
  # `if` restricts this to direct pushes to main (post-merge), never PRs — so
  # the OIDC/ECR credentials are never exposed to fork PRs, and only verified
  # main commits get published.
  build-and-push:
    name: Build & Push Images
    needs: [lint-and-check, test-unit, test-integration]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      sha: ${{ steps.tag.outputs.sha }}
    steps:
      - uses: actions/checkout@v6
      # buildx (docker-container driver) is required for the GitHub Actions
      # layer cache used by ./.github/actions/build-push-image. The cache
      # restores the base layers (apt deps, node, bun, mpak) that don't change
      # between commits, so a warm build skips them.
      - uses: docker/setup-buildx-action@v4
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: us-east-1
      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr
      - name: Set image tag
        id: tag
        run: echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
      - name: Build and push platform image
        uses: ./.github/actions/build-push-image
        with:
          context: .
          file: Dockerfile
          cache-scope: platform
          build-args: BUILD_SHA=${{ steps.tag.outputs.sha }}
          tags: ${{ steps.ecr.outputs.registry }}/nimblebrain/nimblebrain-runtime:${{ steps.tag.outputs.sha }}
      - name: Build and push web image
        uses: ./.github/actions/build-push-image
        with:
          context: web
          file: web/Dockerfile
          cache-scope: web
          tags: ${{ steps.ecr.outputs.registry }}/nimblebrain/nimblebrain-web:${{ steps.tag.outputs.sha }}

  # Roll the staging "edge" channel onto this build. Fires a single
  # repository_dispatch into the private deploy-config repo, whose bump workflow
  # rewrites the edge image tag in git; Argo then auto-syncs every staging tenant.
  # GitOps stays intact — the image ref is recorded in git, not pushed to the
  # cluster from here. Production is NOT touched (it promotes deliberately by tag).
  #
  # Fully optional: if the App isn't configured (vars/secrets unset) the job
  # no-ops, so forks and pre-setup CI stay green. Config:
  #   vars.DEPLOY_CONFIG_REPO       — deploy-config repo name (same org)
  #   vars.EDGE_BUMP_APP_ID          — GitHub App id (Contents: write on that repo)
  #   secrets.EDGE_BUMP_APP_KEY      — that App's private key
  roll-staging-edge:
    name: Roll staging edge channel
    needs: [build-and-push, changes]
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.changes.outputs.image_relevant == 'true'
    runs-on: ubuntu-latest
    # Authenticates with a minted App token, never GITHUB_TOKEN — needs no grants.
    permissions: {}
    steps:
      - name: Check edge-bump config
        id: cfg
        env:
          APP_ID: ${{ vars.EDGE_BUMP_APP_ID }}
          REPO: ${{ vars.DEPLOY_CONFIG_REPO }}
          KEY: ${{ secrets.EDGE_BUMP_APP_KEY }}
        run: |
          if [ -n "$APP_ID" ] && [ -n "$REPO" ] && [ -n "$KEY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "edge-bump not fully configured (need EDGE_BUMP_APP_ID + DEPLOY_CONFIG_REPO vars + EDGE_BUMP_APP_KEY secret) — skipping"
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Mint deploy-repo token
        if: steps.cfg.outputs.enabled == 'true'
        id: token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.EDGE_BUMP_APP_ID }}
          private-key: ${{ secrets.EDGE_BUMP_APP_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ vars.DEPLOY_CONFIG_REPO }}
      - name: Fire edge bump
        if: steps.cfg.outputs.enabled == 'true'
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
        run: |
          # -f (raw string), NOT -F: -F type-coerces all-digit values to JSON
          # numbers, which mangles all-digit SHAs (esp. leading-zero). A SHA is an
          # opaque string.
          gh api "repos/${{ github.repository_owner }}/${{ vars.DEPLOY_CONFIG_REPO }}/dispatches" \
            -f event_type=runtime-image-pushed \
            -f "client_payload[sha]=${{ needs.build-and-push.outputs.sha }}"
