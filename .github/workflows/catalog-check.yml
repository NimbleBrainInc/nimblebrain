name: Catalog DCR Check

# Catalog rot detector — runs `bun run check:catalog` against the DCR
# entries in `src/connectors/catalog.yaml`. Network-dependent by design;
# kept out of `bun run verify` (offline) and gated on PRs that touch the
# catalog so we don't pay the network cost on unrelated changes.
#
# What this catches:
#   - A vendor URL goes 5xx / DNS-fail / times out.
#   - A vendor drops DCR support (or never had it — an entry was added
#     against incorrect docs).
#   - A vendor changes their well-known metadata path or stops
#     advertising `registration_endpoint`.
#
# What it doesn't catch (yet):
#   - Vendors that advertise resource-metadata only via the
#     WWW-Authenticate header (RFC 9728 §3.1). Tracked as issue #196.

on:
  pull_request:
    branches: [main]
    paths:
      - "src/connectors/catalog.yaml"
      - "scripts/check-catalog-dcr.ts"
      - ".github/workflows/catalog-check.yml"

# Pinned (not `latest`) for deterministic CI; matches ci.yml / release.yml.
# Bump here to upgrade.
env:
  BUN_VERSION: "1.3.14"

jobs:
  catalog-dcr:
    name: DCR connector probe
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Install dependencies
        run: bun install
      - name: Probe DCR entries
        run: bun run check:catalog
