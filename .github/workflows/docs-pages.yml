name: Deploy Docs

# Builds docs/ and deploys to GitHub Pages (docs.nimblebrain.ai).
# Runs on push to main when docs change. The custom domain is configured in
# repo Settings -> Pages; docs/public/CNAME keeps it on the artifact.

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/docs-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Build
        run: cd docs && bun install --frozen-lockfile && bun run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
