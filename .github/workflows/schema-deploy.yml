name: Deploy Config Schema

# Publishes src/config/nimblebrain-config.schema.json to schemas.nimblebrain.ai
# (S3 + CloudFront invalidation) on push to main when the schema changes. This
# repo is the canonical source for the config schema; the published URL is just
# the artifact editors and external validators fetch via `$schema`.
#
# Auth: GitHub OIDC -> the `github-actions-schemas-deploy` IAM role (defined in
# infra/terraform/shared). No long-lived AWS keys. The role's S3 write is scoped
# to this one object key, so it cannot touch the server schema that shares the
# bucket. Repo vars: SCHEMAS_DEPLOY_ROLE_ARN, SCHEMAS_CF_DISTRIBUTION_ID.

on:
  push:
    branches: [main]
    paths:
      - 'src/config/nimblebrain-config.schema.json'
      - '.github/workflows/schema-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: schema-deploy
  cancel-in-progress: false

env:
  SCHEMA_FILE: src/config/nimblebrain-config.schema.json
  S3_KEY: v1/nimblebrain-config.schema.json
  BUCKET: schemas.nimblebrain.ai

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.SCHEMAS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Upload schema to S3
        # Short, revalidating TTL — NOT immutable. The /v1/ path evolves
        # additively (new optional flags), so consumers must be able to pick up
        # changes; immutable caching here is what stranded the schema before.
        run: |
          aws s3 cp "$SCHEMA_FILE" "s3://$BUCKET/$S3_KEY" \
            --content-type "application/schema+json" \
            --cache-control "public, max-age=300, must-revalidate"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.SCHEMAS_CF_DISTRIBUTION_ID }}" \
            --paths "/$S3_KEY"
